# vim:fileencoding=utf-8:foldmethod=marker

# Catppuccin theme (src: https://github.com/catppuccin/kitty/blob/main/themes/mocha.conf)
include mocha.conf

# Font stuff
font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14.0

# Tab bar (src: https://github.com/catppuccin/kitty)
tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
