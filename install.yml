---
- hosts: all
  become: true
  vars:
    packages:
      - zsh
      - ripgrep
      - fzf
      - zoxide
      # - lazygit
    dotfiles_dir: "{{ ansible_env.HOME }}/.dotfiles"
    asdf_dir: /opt/asdf

  tasks:
    - name: Install GNU stow
      package:
        name: "stow"
        state: present

    - name: Stow dotfiles
      command: stow -d {{ dotfiles_dir }} -t {{ ansible_env.HOME }} .
      args:
        chdir: "{{ dotfiles_dir }}"
      become: false

    - name: Install common packages
      package:
        name: "{{ packages }}"
        state: present

    - name: Install build-essential (Debian/Ubuntu)
      package:
        name: build-essential
        state: present
      when: ansible_os_family == "Debian"

    - name: Set up PATH
      set_fact:
        custom_path: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.HOME }}/.cargo/bin:{{ asdf_dir }}/bin:{{ asdf_dir }}/shims:{{ ansible_env.PATH }}"

    - name: Install Rust
      block:
        - name: Check if cargo exists
          command: which cargo
          register: cargo_check
          changed_when: false
          failed_when: false

        - name: Install Rust via rustup
          when: cargo_check.rc != 0
          shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          args:
            creates: "{{ ansible_env.HOME }}/.cargo/bin/cargo"

    - name: Install and configure bob-nvim
      block:
        - name: Install bob-nvim
          shell: "{{ ansible_env.HOME }}/.cargo/bin/cargo install bob-nvim"
          args:
            creates: "{{ ansible_env.HOME }}/.cargo/bin/bob"
          environment:
            PATH: "{{ custom_path }}"
        
        - name: Install and use latest neovim
          shell: |
            {{ ansible_env.HOME }}/.cargo/bin/bob install latest
            {{ ansible_env.HOME }}/.cargo/bin/bob use latest
          environment:
            PATH: "{{ custom_path }}"

    - name: Install asdf
      block:
        - name: Clone asdf
          git:
            repo: https://github.com/asdf-vm/asdf.git
            dest: "{{ asdf_dir }}"
            version: master
          become: false

        - name: Install NodeJS plugin
          shell: "{{ asdf_dir }}/bin/asdf plugin add nodejs https://github.com/asdf-vm/asdf-nodejs.git"
          args:
            creates: "{{ asdf_dir }}/plugins/nodejs"
          environment:
            PATH: "{{ custom_path }}"
        
        - name: Install latest NodeJS
          shell: |
            {{ asdf_dir }}/bin/asdf install nodejs latest
            {{ asdf_dir }}/bin/asdf global nodejs latest
          environment:
            PATH: "{{ custom_path }}"

